; platformio.ini — Configuración base para M5Stack Cardputer (ESP32-S3, StampS3)

[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino

; El Cardputer usa el USB nativo del ESP32-S3 (CDC/JTAG), no un chip UART externo.
; Estas flags habilitan el puerto USB como salida serial para Serial.print().
build_flags =
    -DARDUINO_USB_MODE=1        ; Usa el USB nativo, no UART
    -DARDUINO_USB_CDC_ON_BOOT=1 ; Habilita CDC (Communications Device Class) al arrancar
    -DBOARD_HAS_PSRAM           ; El StampS3 tiene 8MB de PSRAM — necesario para buffers grandes

; Tabla de particiones con espacio para OTA y SPIFFS/LittleFS
board_build.partitions = default_16MB.csv

; Velocidad del monitor serial
monitor_speed = 115200

; Librería base de M5Stack — la vamos a usar inicialmente y luego la iremos reemplazando
lib_deps =
    m5stack/M5Unified@^0.2.2
    m5stack/M5Cardputer@^1.0.1